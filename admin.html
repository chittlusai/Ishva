<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ishva | Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body class="dark-theme">
    <div id="lights" class="ambient-lights">
        <div class="light-orb orb-1"></div>
        <div class="light-orb orb-2"></div>
        <div class="light-orb orb-3"></div>
    </div>
    
    <nav class="navbar glass logged-in" style="position: sticky; z-index: 100;">
        <div class="logo"><span class="logo-text">Ishva Admin</span></div>
        
        <div class="admin-profile" style="position: absolute; right: 20px; cursor: pointer; padding: 0; background: transparent; border: none; z-index: 105;" id="admin-profile-btn">
            <div id="admin-icon-display" style="width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #1A1A2E, #16213E, #0F3460); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; font-family: var(--font-heading); box-shadow: 0 4px 10px rgba(0,0,0,0.5);">👑</div>
            <div style="display: none;">
                <div id="admin-name-display">Admin User</div>
                <div id="admin-quotes-count">0</div>
            </div>
        </div>

        <div class="nav-links" style="display: flex; align-items: center; gap: 30px;">
            <a href="javascript:void(0)" class="btn btn-secondary logout-trigger" style="padding: 8px 20px; font-size: 0.85rem;" onclick="localStorage.removeItem('ishva_user'); localStorage.removeItem('ishva_phone'); window.location.href='index.html';">Log Out</a>
            
            <a href="javascript:void(0)" class="mobile-logout-link logout-trigger" style="display:none; color:#ff4d4d; border-top:1px solid rgba(255,255,255,0.05); text-align:center; padding:20px 0;" onclick="localStorage.removeItem('ishva_user'); localStorage.removeItem('ishva_phone'); window.location.href='index.html';">🔴 Disconnect Session</a>
        </div>
    </nav>

    <main>
        <section class="admin-section" style="max-width: 800px; margin: 100px auto;">
            <h2 class="section-title">Leads & Active Quotes</h2>
            <div class="glass-panel" style="padding: 40px; overflow-x: auto;">
                <table style="width:100%; color: var(--text-secondary); text-align: left; border-collapse: collapse;">
                    <thead>
                        <tr style="color: white; border-bottom: 2px solid rgba(255,255,255,0.1);">
                            <th style="padding: 12px;">Contact Num.</th>
                            <th style="padding: 12px;">Package & Addons</th>
                            <th style="padding: 12px;">Total Value</th>
                            <th style="padding: 12px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body">
                        <!-- Populated by JavaScript LocalStorage Query -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Admin Settings Modal -->
    <div class="modal-overlay" id="admin-settings-modal">
        <div class="modal-content glass-panel" style="max-width: 400px; text-align: left;">
            <button class="close-btn" id="close-settings-modal"><i data-lucide="x"></i></button>
            <h2 style="font-family: var(--font-heading); margin-bottom: 8px;">Profile Settings</h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 24px;">Update your admin display properties.</p>
            <form class="login-form">
                <div class="input-group" style="text-align: left;">
                    <label>Profile Name</label>
                    <input type="text" id="setting-name" placeholder="Admin User" />
                </div>
                <div class="input-group" style="text-align: left;">
                    <label>Profile Icon (Emoji or Letter)</label>
                    <input type="text" id="setting-icon" maxlength="2" placeholder="👑" />
                </div>
                <button class="btn btn-primary w-100" type="button" id="save-settings-btn">Save Changes</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
